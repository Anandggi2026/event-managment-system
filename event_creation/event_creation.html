<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Creation Form</title>
<link rel="stylesheet" href="event_creation.css">
</head>

<body>

    <div class="form-container">

        <div class="form-header">
            Event Creation Form
        </div>

        <form id="eventForm">

            <div class="form-body">

                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="eventName" placeholder="Enter Event Name">
                </div>


                <div class="form-group">
                    <label>Date of Event</label>
                    <input type="date" id="eventDate" title="date-of-event">
                </div>


                <div class="form-group">
                    <label>Venue</label>

                    <select id="venue" title="venue">
                        <option value="">Select Venue</option>
                        <option>CSE Auditorium</option>
                        <option>Seminar Hall</option>
                        <option>Lab 1</option>
                        <option>Conference Room</option>
                    </select>

                </div>


                <div class="form-group">
                    <label>Sub-Events (Max 4)</label>

                    <div id="subEvents" class="sub-events">

                        <input type="text" placeholder="Sub Event 1">
                        <input type="text" placeholder="Sub Event 2">

                    </div>

                    <button type="button" class="add-btn" onclick="addSubEvent()">Add Sub Event</button>

                </div>


                <div class="form-group">

                    <label>Timing</label>

                    <div class="timing">

                        <input type="time" id="startTime" title="timing">
                        <input type="time" id="endTime" title="timing">

                    </div>

                </div>


                <div class="form-group">

                    <label>Description</label>

                    <textarea id="description" placeholder="Enter event description, guidelines, etc..."></textarea>

                </div>


                <div class="form-buttons">

                    <button type="submit" class="create-btn">
                        Create Event
                    </button>

                    <button type="button" class="reset-btn" onclick="resetForm()">
                        Reset
                    </button>

                </div>

            </div>

        </form>

    </div>

    <script src="event_creation.js"></script>

</body>
</html>
