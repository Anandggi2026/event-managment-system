{% extends "base.html" %}

{% block title %}Server Error - 500{% endblock %}

{% block extra_css %}
<style>
    .error-container {
        min-height: calc(100vh - 56px - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f5576c 0%, #ff6b6b 100%);
        padding: 20px;
    }

    .error-content {
        background: white;
        padding: 60px 40px;
        border-radius: 15px;
        text-align: center;
        max-width: 500px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .error-code {
        font-size: 6rem;
        font-weight: 700;
        color: #dc3545;
        margin-bottom: 20px;
        line-height: 1;
    }

    .error-title {
        font-size: 2rem;
        color: #2c3e50;
        margin-bottom: 15px;
        font-weight: 700;
    }

    .error-message {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 30px;
        line-height: 1.6;
    }

    .error-icon {
        font-size: 5rem;
        color: #dc3545;
        margin-bottom: 20px;
        opacity: 0.8;
    }

    .btn-back {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
    }

    .btn-back:hover {
        background: linear-gradient(135deg, #764ba2, #667eea);
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-home {
        background: #f0f0f0;
        color: #666;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        margin-left: 15px;
        transition: all 0.3s ease;
    }

    .btn-home:hover {
        background: #e0e0e0;
    }
</style>
{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <div class="error-code">500</div>
        <h1 class="error-title">Server Error</h1>
        <p class="error-message">
            Oops! Something went wrong on our end. Our team has been notified and is working to fix it.
        </p>
        <div style="margin-top: 30px;">
            <a href="javascript:history.back()" class="btn-back">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
            <a href="{{ url_for('index') }}" class="btn-home">
                <i class="fas fa-home"></i> Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
