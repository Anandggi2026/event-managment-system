<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Creation Form</title>
<link rel="stylesheet" href="style12.css">
</head>

<body>

    <div class="form-container">

        <div class="form-header">
            Registration Form
        </div>

        <form id="eventForm">

            <div class="form-body">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="Enter Name" placeholder="Enter Event Name">
                </div>

                <div class="form-group">
                    <label>Branch</label>
                    <select class="selection">
                        <option value="AIML">AIML</option>
                        <option value="IOT & DS">IOT & DS</option>
                        <option value="CSE">CSE</option>
                        <option value="HMCT">HMCT</option>
                        <option value="Business">Business Managment</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Roll No.</label>
                    <input type="text" id="enterRollno." placeholder="Enter Roll no.">
                </div>

                <div class="form-group">
                    <label>Semester</label>
                    <input type="text" id="enterSemester " placeholder="Enter Semester">
                </div>

                <div class="form-group">
                    <label>Event</label>
                    <select class="selection">
                        <option value="selectEvent">Select Your Event</option>
                        <option value="Robomania">Robomania</option>
                        <option value="CodeHunt">CodeHunt</option>
                        <option value="Hackathon">Hackathon</option>
                        <option value="BookReview">Book Review</option>
                        
                    </select>
                </div>

                <div class="form-group">
                    <label>Sub-Events (Max 2)</label>

                    <div id="subEvents" class="sub-events">

                        <input type="text" placeholder="Sub Event 1">
                        <input type="text" placeholder="Sub Event 2">

                    </div>

                </div>

                <div class="form-buttons">

                    <button type="submit" class="create-btn">
                        SUbmit
                    </button>

                    <button type="button" class="reset-btn" onclick="resetForm()">
                        Reset
                    </button>

                </div>

            </div>

        </form>

    </div>

    <script src="event_creation.js"></script>

</body>
</html>
